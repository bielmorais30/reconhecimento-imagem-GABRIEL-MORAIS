<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gerencie seu dia</title>
  <meta name="description" content="Aplicação de gerenciamento de tarefas pessoal. Organize seu trabalho, estudos e vida pessoal com TaskFlow." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            surface: '#0f172a',
            card: 'rgba(255,255,255,0.04)',
            border: 'rgba(255,255,255,0.08)',
            accent: '#38bdf8',
            danger: '#f87171',
            success: '#4ade80',
            muted: '#64748b',
          },
          backdropBlur: { card: '20px' },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; }

    /* --- Glass Card --- */
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* --- Fade-in / slide-up --- */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeSlideUp 0.45s cubic-bezier(.22,1,.36,1) both; }

    /* --- Inputs --- */
    .field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 11px 14px;
      color: #f1f5f9;
      font-size: 0.925rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field::placeholder { color: #475569; }
    .field:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    select.field option { background: #1e293b; color: #f1f5f9; }

    /* --- Buttons --- */
    .btn-primary {
      width: 100%;
      padding: 11px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.925rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56,189,248,0.30);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      padding: 7px 14px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.85rem;
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-ghost:hover { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.08); }

    .btn-done {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(74,222,128,0.12);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.25);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-done:hover { background: rgba(74,222,128,0.22); transform: scale(1.04); }
    .btn-done:disabled {
      opacity: 0.38;
      cursor: default;
      transform: none;
    }

    /* --- Error / Success inline messages --- */
    .msg-error {
      color: #f87171;
      font-size: 0.825rem;
      margin-top: 6px;
      display: none;
    }
    .msg-error.visible { display: block; }
    .msg-success {
      color: #4ade80;
      font-size: 0.825rem;
      margin-top: 6px;
      display: none;
    }
    .msg-success.visible { display: block; }

    /* --- Task card states --- */
    .task-card { transition: opacity 0.3s, transform 0.3s; }
    .task-card.done-card { opacity: 0.40; }
    .task-card.done-card .task-title { text-decoration: line-through; color: #475569; }

    /* --- Badge tipos --- */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-trabalho  { background: rgba(56,189,248,0.15);  color: #38bdf8;  border: 1px solid rgba(56,189,248,0.25); }
    .badge-pessoal   { background: rgba(232,121,249,0.15); color: #e879f9;  border: 1px solid rgba(232,121,249,0.25); }
    .badge-estudos   { background: rgba(74,222,128,0.15);  color: #4ade80;  border: 1px solid rgba(74,222,128,0.25); }

    /* --- Divider link --- */
    .link-swap {
      background: none; border: none;
      color: #38bdf8; font-size: 0.875rem;
      cursor: pointer; text-decoration: underline;
      transition: color 0.15s;
    }
    .link-swap:hover { color: #7dd3fc; }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 99px; }
  </style>
</head>
<body class="text-slate-100">

  <!-- ══════════════════════════════════
       SCREEN: AUTH (login / register)
  ══════════════════════════════════ -->
  <section id="screen-auth"
    class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

    <!-- brand -->
    <div class="mb-8 text-center animate-in">
      <div class="inline-flex items-center gap-2 mb-2">
        <span class="text-accent text-2xl">✦</span>
        <h1 class="text-2xl font-bold tracking-tight text-white">TaskFlow</h1>
      </div>
      <p class="text-slate-500 text-sm">Organize. Foque. Conquiste.</p>
    </div>

    <!-- card -->
    <div class="glass rounded-2xl w-full max-w-sm p-8 animate-in" style="animation-delay:.08s">

      <!-- TAB SWITCHER -->
      <div class="flex gap-1 bg-white/5 rounded-xl p-1 mb-7">
        <button id="tab-login"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all"
          onclick="App.showTab('login')">
          Entrar
        </button>
        <button id="tab-register"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition-all"
          onclick="App.showTab('register')">
          Cadastrar
        </button>
      </div>

      <!-- ─── LOGIN FORM ─── -->
      <form id="form-login" onsubmit="App.handleLogin(event)" novalidate>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="login-email">
              E-mail
            </label>
            <input id="login-email" type="email" class="field" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="login-password">
              Senha
            </label>
            <input id="login-password" type="password" class="field" placeholder="••••••••" autocomplete="current-password" />
          </div>

          <p id="login-error" class="msg-error"></p>

          <button type="submit" class="btn-primary mt-2">Entrar</button>
        </div>
      </form>

      <!-- ─── REGISTER FORM ─── -->
      <form id="form-register" onsubmit="App.handleRegister(event)" novalidate class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="reg-name">
              Nome completo
            </label>
            <input id="reg-name" type="text" class="field" placeholder="Seu nome" autocomplete="name" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="reg-email">
              E-mail
            </label>
            <input id="reg-email" type="email" class="field" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5" for="reg-password">
              Senha
            </label>
            <input id="reg-password" type="password" class="field" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
          </div>

          <p id="reg-error"   class="msg-error"></p>
          <p id="reg-success" class="msg-success"></p>

          <button type="submit" class="btn-primary mt-2">Criar conta</button>
        </div>
      </form>

      <!-- swap hint -->
      <p class="text-center text-slate-500 text-sm mt-6">
        <span id="swap-hint-login">Não tem conta?
          <button class="link-swap" onclick="App.showTab('register')">Cadastre-se</button>
        </span>
        <span id="swap-hint-register" class="hidden">Já tem conta?
          <button class="link-swap" onclick="App.showTab('login')">Entrar</button>
        </span>
      </p>
    </div>
  </section>

  <!-- ══════════════════════════════════
       SCREEN: DASHBOARD
  ══════════════════════════════════ -->
  <section id="screen-dashboard" class="hidden min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="glass sticky top-0 z-20 border-b border-white/[0.06]">
      <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-accent text-lg">✦</span>
          <div>
            <p class="text-[11px] text-slate-500 leading-none mb-0.5">Bem-vindo de volta</p>
            <h2 id="greeting-name" class="text-white font-semibold text-sm leading-none">—</h2>
          </div>
        </div>
        <button id="btn-logout" class="btn-ghost" onclick="App.handleLogout()">
          Sair ↗
        </button>
      </div>
    </header>

    <main class="max-w-2xl mx-auto w-full px-4 py-8 flex flex-col gap-6 flex-1">

      <!-- ADD TASK CARD -->
      <div class="glass rounded-2xl p-6 animate-in">
        <h3 class="text-white font-semibold mb-5 flex items-center gap-2">
          <span class="w-1.5 h-5 rounded-full bg-accent inline-block"></span>
          Nova tarefa
        </h3>
        <form id="form-task" onsubmit="App.handleAddTask(event)" novalidate>
          <div class="space-y-4">

            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5" for="task-title">
                Título <span class="text-danger">*</span>
              </label>
              <input id="task-title" type="text" class="field" placeholder="O que precisa ser feito?" />
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5" for="task-type">
                Tipo
              </label>
              <select id="task-type" class="field">
                <option value="Trabalho">Trabalho</option>
                <option value="Pessoal">Pessoal</option>
                <option value="Estudos">Estudos</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5" for="task-desc">
                Descrição <span class="text-slate-600">(opcional)</span>
              </label>
              <textarea id="task-desc" class="field" rows="3"
                placeholder="Detalhes adicionais..."></textarea>
            </div>

            <p id="task-error" class="msg-error"></p>

            <button type="submit" class="btn-primary">+ Adicionar Tarefa</button>
          </div>
        </form>
      </div>

      <!-- TASK LIST -->
      <div class="animate-in" style="animation-delay:.1s">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-white font-semibold flex items-center gap-2">
            <span class="w-1.5 h-5 rounded-full bg-emerald-400 inline-block"></span>
            Minhas tarefas
          </h3>
          <span id="task-count" class="text-xs text-slate-500 font-medium"></span>
        </div>
        <div id="task-list" class="space-y-3"></div>
      </div>

    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
